<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>{{案件名}} ご提案書</title>
<style>
  :root{
    --main:#4EB0EA;          /* メインカラー */
    --main-d:#2a8fcc;        /* 濃いめ（文字・線） */
    --main-dd:#1d6a9c;       /* さらに濃い */
    --ink:#1b2733; --sub:#54657a; --off:#9aa7b4;
    --accent:#f2994a;        /* 差し色（新設・注意） */
    --line:#dbe3ec; --soft:#f3f8fc; --soft2:#eaf4fb; --paper:#fff;
    --good:#36a36b;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  @page{ size:338.7mm 190.5mm; margin:0; }    /* 16:9 ワイド */
  .idc{ color:var(--off); font-size:8pt; white-space:nowrap; }   /* 内部ID列（会話用）。提出PDFでは非表示 */
  @media print{ .idc{ display:none; } }
  html,body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    color:var(--ink); -webkit-print-color-adjust:exact; print-color-adjust:exact;
    word-break:auto-phrase; line-break:strict; overflow-wrap:break-word;
  }
  .slide{
    position:relative; width:338.7mm; height:190.5mm; overflow:hidden;
    background:var(--paper); page-break-after:always;
    padding:16mm 20mm 14mm; display:flex; flex-direction:column;
  }
  .slide:last-child{ page-break-after:auto; }
  @media screen{
    body{ background:#dde4ec; padding:9mm 0; }
    .slide{ margin:0 auto 9mm; box-shadow:0 3px 16px rgba(27,39,51,.18); }
    .slide:last-child{ margin-bottom:0; }
  }

  /* 共通見出し */
  .eyebrow{ font-size:10pt; letter-spacing:.22em; color:var(--main-d); font-weight:800; text-transform:uppercase; }
  .ttl{ font-size:25pt; font-weight:800; color:var(--ink); margin-top:4mm; line-height:1.28; letter-spacing:.01em; }
  .lead{ font-size:11.5pt; color:var(--sub); margin-top:3.5mm; line-height:1.7; }
  .lead b{ color:var(--main-dd); }
  .body{ flex:1; margin-top:6mm; display:flex; flex-direction:column; }
  .brandbar{ position:absolute; left:0; top:0; width:100%; height:5mm; background:linear-gradient(90deg,var(--main-dd),var(--main) 70%,#8fd0f3); }
  .pg{ position:absolute; right:16mm; bottom:7mm; font-size:9pt; color:var(--off); letter-spacing:.08em; }
  .footmark{ position:absolute; left:20mm; bottom:7mm; font-size:8.5pt; color:var(--off); letter-spacing:.1em; }

  b{ color:var(--main-dd); }
  .ink{ color:var(--ink)!important; }
  .todo{ display:inline-block; font-size:9pt; font-weight:800; color:#9a5a1e; background:#fdf3e8; border:1px dashed var(--accent); border-radius:1mm; padding:.2mm 2mm; }

  /* 表紙 */
  .cover{ justify-content:center; padding-left:26mm;
    background:radial-gradient(1200px 620px at 82% -12%,rgba(78,176,234,.30),transparent 60%),linear-gradient(135deg,#0e3a59 0%,#1d6a9c 55%,#2a8fcc 100%); color:#fff; }
  .cover .eyebrow{ color:#cdeafb; }
  .cover h1{ font-size:44pt; font-weight:900; line-height:1.2; margin-top:8mm; }
  .cover .sub{ font-size:15pt; margin-top:9mm; color:#eaf6ff; font-weight:600; }
  .cover .desc{ font-size:11.5pt; margin-top:6mm; color:#cfe7f6; line-height:1.85; max-width:230mm; }
  .cover .desc b{ color:#fff; }
  .cover .who{ margin-top:13mm; font-size:11pt; color:#eaf6ff; }
  .cover .who b{ color:#fff; }

  /* カード（3〜4枚） */
  .cards{ display:flex; gap:7mm; margin-top:auto; margin-bottom:auto; }
  .card{ flex:1; background:var(--soft); border:1px solid var(--line); border-radius:3mm; padding:7mm 6mm; }
  .card .num{ font-size:13pt; font-weight:800; color:#fff; background:var(--main); width:9mm; height:9mm; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .card h3{ font-size:13pt; color:var(--ink); margin:4mm 0 3mm; font-weight:800; white-space:nowrap; }
  .card p{ font-size:10.5pt; color:var(--sub); line-height:1.7; }
  .card p b{ color:var(--main-dd); }

  /* 値箱（お客様／自社） */
  .vrow{ display:flex; gap:6mm; }
  .vbox{ flex:1; background:var(--soft); border:1px solid var(--line); border-left:4px solid var(--main); border-radius:0 2mm 2mm 0; padding:4mm 5.5mm; }
  .vbox .vh{ font-size:9.5pt; color:var(--main-d); font-weight:800; letter-spacing:.04em; }
  .vbox .vt{ font-size:11pt; color:var(--ink); margin-top:1.8mm; line-height:1.55; font-weight:600; }
  .vbox .vt b{ color:var(--main-dd); }
  .vbox.b{ border-left-color:var(--accent); }
  .vbox.b .vh{ color:#c9772a; }

  /* リスト */
  ul.pl{ list-style:none; margin-top:3mm; }
  ul.pl li{ font-size:11pt; color:var(--ink); line-height:1.6; padding:2mm 0 2mm 7mm; position:relative; }
  ul.pl li:before{ content:""; position:absolute; left:0; top:3.8mm; width:3.2mm; height:3.2mm; border-radius:50%; background:var(--main); }
  ul.pl b{ color:var(--main-dd); }
  ul.li{ list-style:none; }
  ul.li li{ font-size:10pt; color:var(--ink); line-height:1.5; padding:1.6mm 0 1.6mm 6mm; position:relative; }
  ul.li li:before{ content:""; position:absolute; left:0; top:3.1mm; width:2.6mm; height:2.6mm; border-radius:50%; background:var(--main); }
  ul.li.off li:before{ background:var(--off); }
  ul.li b{ color:var(--main-dd); }
  ul.chk{ list-style:none; }
  ul.chk li{ font-size:10.2pt; color:var(--ink); line-height:1.55; padding:1.6mm 0 1.6mm 7mm; position:relative; }
  ul.chk li:before{ content:"✓"; position:absolute; left:0; color:var(--main-d); font-weight:900; }
  ul.chk b{ color:var(--main-dd); }

  .note{ font-size:10.5pt; color:var(--main-dd); background:var(--soft2); border-left:3px solid var(--main); padding:3.4mm 5mm; border-radius:0 2mm 2mm 0; line-height:1.6; }
  .note.warn{ color:#9a5a1e; background:#fdf3e8; border-color:var(--accent); }
  .note b{ color:var(--main-dd); }
  .note.warn b{ color:#9a5a1e; }

  /* 現状4サイト地図 */
  .snwrap{ display:flex; gap:4mm; }
  .snbox{ flex:1; border:1px solid var(--line); border-radius:2mm; background:#fff; display:flex; flex-direction:column; overflow:hidden; }
  .snbox .hd{ background:var(--soft); border-bottom:1px solid var(--line); padding:2.8mm 3.6mm; }
  .snbox .nm{ font-size:12pt; font-weight:800; color:var(--ink); }
  .snbox .cms{ display:inline-block; font-size:7.6pt; font-weight:800; color:var(--main-d); background:var(--soft2); border:1px solid #bfe0f5; border-radius:1mm; padding:.4mm 1.8mm; margin-top:1.6mm; }
  .snbox .cms.dr{ color:#9a5a1e; background:#fdf3e8; border-color:#f0d9b8; }
  .snbox ul{ list-style:none; padding:2.6mm 3.6mm; flex:1; }
  .snbox li{ font-size:9pt; color:var(--ink); line-height:1.7; padding-left:3.2mm; position:relative; }
  .snbox li:before{ content:"·"; position:absolute; left:.4mm; color:var(--off); font-weight:900; }
  .snbox li b{ color:var(--main-dd); }
  .snbox.base{ border-color:var(--main); }
  .snbox.base .hd{ background:var(--soft2); border-bottom-color:#bfe0f5; }

  /* 統合後マップ（タイル） */
  .gmap{ border:1.4px solid var(--main); border-radius:2.5mm; overflow:hidden; }
  .gmap .gmhd{ background:var(--soft2); border-bottom:1px solid #bfe0f5; padding:2.6mm 4mm; font-size:12.5pt; font-weight:800; color:var(--ink); }
  .gmlabel{ font-size:8pt; font-weight:800; color:var(--sub); padding:2.6mm 4mm 0; }
  .gmgrid{ display:flex; gap:2mm; padding:1.5mm 4mm 4mm; }
  .gt{ flex:1; border-radius:1.8mm; border:1px solid var(--line); background:var(--soft); padding:3mm 1.4mm; text-align:center; font-size:9.4pt; font-weight:800; color:var(--ink); line-height:1.25; min-height:20mm; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.4mm; }
  .gt small{ display:block; font-size:7.2pt; font-weight:700; color:var(--sub); }
  .gt.new{ border:1.6px dashed var(--accent); background:#fdf6ee; color:#c9772a; }
  .gt.new small{ color:#c9772a; }
  .gmfound{ display:flex; align-items:center; gap:3mm; margin:0 4mm 4mm; padding:3mm 4mm; border-radius:2mm; background:linear-gradient(135deg,#0e3a59,#1d6a9c); color:#fff; }
  .gmfound .fl{ font-size:10.5pt; font-weight:800; white-space:nowrap; }
  .gmfound .ft{ flex:1; font-size:8.8pt; font-weight:600; color:#cfe7f6; line-height:1.45; }

  /* テーブル */
  table.t{ width:100%; border-collapse:collapse; margin-top:2mm; font-size:10pt; }
  table.t th{ background:var(--main-dd); color:#fff; padding:2.8mm 3.6mm; text-align:left; font-weight:700; }
  table.t td{ border-bottom:1px solid var(--line); padding:2.6mm 3.6mm; vertical-align:top; line-height:1.55; }
  table.t tr:nth-child(even) td{ background:#fafdff; }
  table.t td.r,table.t th.r{ text-align:right; white-space:nowrap; }
  table.t td.c,table.t th.c{ text-align:center; }
  .pill{ display:inline-block; font-size:7.6pt; font-weight:800; color:#fff; background:var(--accent); border-radius:1mm; padding:.3mm 1.6mm; vertical-align:.4mm; }

  /* ====== 画面ワイヤーフレーム ====== */
  .screen{ border:1.5px solid #c3cfdb; border-radius:2.5mm; overflow:hidden; background:#fff; box-shadow:0 1px 6px rgba(27,39,51,.08); }
  .scbar{ background:#e9eef4; padding:1.6mm 3mm; display:flex; align-items:center; gap:1.4mm; border-bottom:1px solid #d4dde6; }
  .scbar .d{ width:2.4mm; height:2.4mm; border-radius:50%; background:#c6d0db; }
  .scbar .url{ flex:1; background:#fff; border:1px solid #d4dde6; border-radius:1.2mm; font-size:7.8pt; color:#90a0b0; padding:.8mm 2.4mm; margin-left:2mm; }
  .topnav{ display:flex; align-items:center; background:#fff; border-bottom:2px solid var(--main); font-size:8pt; padding:0 3mm; }
  .topnav .logo{ font-weight:900; color:var(--main-dd); padding:2.4mm 3mm 2.4mm 1mm; font-size:10pt; }
  .topnav .n{ padding:2.4mm 2.2mm; color:var(--sub); white-space:nowrap; }
  .topnav .n.active{ color:var(--ink); font-weight:800; border-bottom:2px solid var(--main); margin-bottom:-2px; }
  .topnav .n.new{ color:var(--accent); font-weight:800; }
  .crumb{ font-size:8pt; color:var(--sub); padding:1.8mm 3mm; background:#fafcfe; border-bottom:1px solid var(--line); }
  .crumb b{ color:var(--ink); }
  .lay{ display:flex; }
  .side{ flex:0 0 34%; background:#fafcfe; border-right:1px solid var(--line); padding:2.6mm 3mm; }
  .side.filter{ background:var(--soft2); }
  .side .sh{ font-weight:800; font-size:8.2pt; color:var(--ink); margin:2.4mm 0 1mm; }
  .side .sh:first-child{ margin-top:0; }
  /* サービスツリー＝1列の表（階層を色で分けたアコーディオン） */
  .tree{ list-style:none; font-size:8pt; line-height:1.3; border:1px solid #cfdbe6; border-radius:1.4mm; overflow:hidden; }
  .tree li{ padding:1.4mm 2mm; border-bottom:1px solid #e3ebf3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tree li:last-child{ border-bottom:none; }
  .tree .l1{ font-weight:800; background:var(--main-dd); color:#fff; }
  .tree .l2{ font-weight:700; background:var(--soft2); color:var(--ink); padding-left:5mm; }
  .tree .l3{ background:var(--soft); color:var(--ink); padding-left:8.5mm; }
  .tree .l4{ background:#fff; color:var(--sub); padding-left:12mm; }
  .tree .cur{ background:var(--accent); color:#fff; font-weight:800; }
  .fw{ display:block; background:#fff; border:1px solid #cdd8e3; border-radius:1.2mm; color:#9aa7b4; padding:1mm 2mm; font-size:8pt; margin:.6mm 0 2mm; }
  .ck{ display:block; font-size:8.2pt; margin:.6mm 0; color:var(--ink); }
  .ck input{ transform:scale(.8); margin-right:1mm; vertical-align:middle; }
  .tagrow{ margin-top:.6mm; }
  .tg{ display:inline-block; font-size:7.4pt; color:var(--sub); background:#fff; border:1px solid var(--line); border-radius:3mm; padding:.2mm 1.8mm; margin:.4mm .4mm 0 0; }
  .tg.on{ background:var(--main); color:#fff; border-color:var(--main); font-weight:700; }
  .main2{ flex:1; padding:2.8mm 3.6mm; }
  .rhd{ font-weight:800; font-size:9pt; color:var(--ink); display:flex; justify-content:space-between; align-items:baseline; margin-bottom:1.8mm; }
  .rhd .cnt{ font-weight:400; font-size:8pt; color:var(--sub); }
  .mega{ display:grid; grid-template-columns:repeat(4,1fr); gap:2mm; background:#fff; border:1px solid #bfe0f5; border-radius:1.6mm; padding:2.2mm; font-size:8pt; margin-bottom:2.4mm; }
  .mega b{ display:block; color:var(--main-dd); font-size:8.2pt; margin-bottom:.8mm; }
  .mega span{ display:block; color:var(--sub); font-size:7.6pt; line-height:1.5; }
  .cardsg{ display:grid; grid-template-columns:1fr 1fr; gap:2.4mm; }
  .rc{ border:1px solid var(--line); border-radius:1.6mm; padding:2mm; background:#fff; }
  .rc .th{ height:7mm; background:#eef3f8; border-radius:1mm; margin-bottom:1.6mm; }
  .rc .ct{ font-weight:800; font-size:8pt; line-height:1.4; margin-bottom:1mm; color:var(--ink); }
  .rc .cg{ font-size:7pt; }
  .rc .cg .b2{ display:inline-block; background:var(--soft2); color:var(--main-d); border-radius:1mm; padding:0 1.4mm; margin:.4mm .4mm 0 0; font-weight:700; }
  .relbox{ border:1px dashed var(--main); border-radius:1.6mm; background:var(--soft2); padding:2.2mm; margin-top:2.4mm; }
  .relbox .rh2{ font-size:8pt; font-weight:800; color:var(--main-dd); margin-bottom:1.6mm; }
  .reltiles{ display:grid; grid-template-columns:repeat(3,1fr); gap:1.6mm; }
  .reltile{ background:#fff; border:1px solid #bfe0f5; border-radius:1.2mm; height:8.4mm; font-size:7pt; color:var(--sub); display:flex; align-items:center; justify-content:center; text-align:center; padding:1mm; line-height:1.3; }
  .smp{ font-size:8.6pt; font-weight:800; color:#fff; background:var(--accent); border:none; border-radius:1.2mm; padding:.7mm 2.8mm; white-space:nowrap; box-shadow:0 1px 3px rgba(242,153,74,.4); }
  /* p4〜6：画面イメージである旨の注意（実デザインと異なる）を目立たせる */
  .imgnote{ font-size:10pt; color:#c9772a; font-weight:800; margin-top:2mm; }
  .imgnote:before{ content:"🖼 "; }

  /* 4つの入口フロー */
  .flow4{ display:flex; gap:3mm; }
  .f4{ flex:1; border:1px solid #bfe0f5; border-radius:1.8mm; background:#fff; padding:2.4mm 3mm; }
  .f4 .n{ font-size:8.2pt; font-weight:800; color:#fff; background:var(--main); border-radius:50%; width:5mm; height:5mm; display:inline-flex; align-items:center; justify-content:center; margin-bottom:1.4mm; }
  .f4 .t{ font-weight:800; font-size:9.4pt; color:var(--ink); }
  .f4 .d{ font-size:8.4pt; color:var(--sub); line-height:1.45; margin-top:.6mm; }

  /* 工程フロー＋タイムライン */
  .flow{ display:flex; gap:2.5mm; margin-top:4mm; }
  .step{ flex:1; min-width:0; text-align:center; position:relative; padding:0 1mm; }
  .step .dot{ width:10mm; height:10mm; border-radius:50%; background:var(--main-dd); color:#fff; font-weight:800; font-size:11pt; display:flex; align-items:center; justify-content:center; margin:0 auto 2.6mm; }
  .step h5{ font-size:10pt; color:var(--ink); font-weight:800; }
  .step p{ font-size:8.4pt; color:var(--sub); margin-top:1.2mm; line-height:1.4; }
  .step .dur{ display:inline-block; font-size:7.8pt; color:#fff; background:var(--main); border-radius:1.4mm; padding:.5mm 2mm; margin-top:1.8mm; font-weight:700; }
  .step:not(:last-child):after{ content:""; position:absolute; top:5mm; right:-50%; width:100%; height:2px; background:var(--line); z-index:-1; }
  .tl{ display:flex; gap:2.5mm; height:9mm; margin-top:7mm; }
  .tlseg{ flex-basis:0; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; border-radius:1.5mm; box-shadow:0 1px 4px rgba(27,39,51,.12); }
  .tlseg .ph{ font-size:8.2pt; font-weight:700; }
  .tlseg .wk{ font-size:7.2pt; opacity:.9; }
  .s1{ background:#0e3a59; } .s2{ background:#1d6a9c; } .s3{ background:#2a8fcc; } .s4{ background:#3da3dd; } .s5{ background:#4EB0EA; } .s6{ background:#6bc0ef; }
  .tlnote{ margin-top:3mm; font-size:10.5pt; color:var(--sub); line-height:1.65; }
  .tlnote b{ color:var(--main-dd); }
  .tlnote .mk{ color:var(--accent); font-weight:800; }
  .tlnote ul{ list-style:none; margin:0; padding:0; }
  .tlnote li{ position:relative; padding:0.8mm 0 0.8mm 4mm; }
  .tlnote li:before{ content:""; position:absolute; left:0; top:2.4mm; width:1.6mm; height:1.6mm; border-radius:50%; background:var(--accent); }
  .tlnote li ul{ margin:0.6mm 0 0; }
  .tlnote li li{ padding:0.4mm 0 0.4mm 4mm; font-size:9.6pt; }
  .tlnote li li:before{ top:2.1mm; width:1.2mm; height:1.2mm; background:transparent; border:0.3mm solid var(--accent); }

  /* 見積 */
  .est{ display:flex; gap:10mm; margin-top:2mm; }
  .price{ width:105mm; background:linear-gradient(135deg,#0e3a59,#1d6a9c); color:#fff; border-radius:3mm; padding:10mm 9mm; }
  .price .cap{ font-size:10.5pt; letter-spacing:.08em; color:#cdeafb; }
  .price .big{ font-size:30pt; font-weight:900; margin-top:3mm; white-space:nowrap; }
  .price .tax{ font-size:12pt; color:#cfe7f6; margin-top:1mm; }
  .price .meta{ margin-top:8mm; font-size:10pt; color:#cfe7f6; line-height:1.9; }
  .price .meta b{ color:#fff; }
  .incl{ flex:1; }
  .incl h4{ font-size:12pt; color:var(--ink); font-weight:800; margin-bottom:3mm; }

  /* 2カラム */
  .cols{ display:flex; gap:10mm; }
  .col{ flex:1; }
  .col h4{ font-size:11.5pt; color:var(--ink); font-weight:800; padding-bottom:2mm; border-bottom:2px solid var(--main); margin-bottom:3mm; display:inline-block; }
  .col.off h4{ border-color:var(--off); color:var(--sub); }

  /* 明細 */
  .estd-t td{ font-size:9.4pt; line-height:1.35; padding-top:1.7mm; padding-bottom:1.7mm; }
  .estd-t td:first-child{ white-space:nowrap; }
  .estd-t tfoot td{ font-weight:800; color:var(--ink); border-top:2px solid var(--main-dd); background:var(--soft2); padding:2.4mm 3.6mm; }
  .estd-t tfoot tr.tot td{ background:var(--main-dd); color:#fff; font-size:11.5pt; }
  /* 付録の一覧表：1スライドに収めるコンパクト版（行が途中で切れないよう分割して使う） */
  table.t.apx td{ font-size:8.6pt; line-height:1.25; padding-top:0.9mm; padding-bottom:0.9mm; }
  table.t.apx .catrow td{ padding-top:0.8mm; padding-bottom:0.8mm; font-size:9pt; }
  table.t.apx th{ padding-top:1.6mm; padding-bottom:1.6mm; }
  ul.li.tight li{ padding-top:.5mm; padding-bottom:.5mm; font-size:9pt; line-height:1.45; }
  ul.li.tight li:before{ top:2.3mm; }

  /* 次の一歩 */
  .nx{ display:flex; gap:6mm; margin-top:3mm; }
  .nx .s{ flex:1; background:var(--soft); border:1px solid var(--line); border-radius:2.5mm; padding:5mm; }
  .nx .s .num{ font-size:11pt; font-weight:800; color:#fff; background:var(--main); width:8mm; height:8mm; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .nx .s h3{ font-size:12pt; margin:3mm 0 2mm; font-weight:800; color:var(--ink); }
  .nx .s p{ font-size:9.5pt; color:var(--sub); line-height:1.6; }

  .closing{ background:linear-gradient(135deg,#0e3a59,#1d6a9c 60%,#2a8fcc); color:#fff; }
  .closing .ttl,.closing .eyebrow{ color:#fff; }
  .closing .eyebrow{ color:#cdeafb; }
  .closing .col h4{ color:#fff; border-color:#8fd0f3; }
  .closing ul.li li{ color:#eaf6ff; } .closing ul.li b{ color:#fff; }
  .closing .end{ position:absolute; right:20mm; bottom:13mm; text-align:right; }
  .closing .end .l{ font-size:13pt; font-weight:800; color:#eaf6ff; }
  .closing .end .b{ font-size:11pt; color:#cdeafb; margin-top:2mm; }

  /* ===== 縦詰め調整（フッターとの干渉回避） ===== */
  /* 長い表（p3/目指す姿）を詰める */
  .tbl-tight th{ padding:1.7mm 3.6mm; }
  .tbl-tight td{ padding:1.4mm 3.6mm; }
  #p3map td:nth-child(6){ white-space:nowrap; }   /* 統合後メニュー列＝折り返さない */
  /* p5 のメニュータイルを低くする */
  .gt{ min-height:14mm; padding:2mm 1.4mm; }
  /* 画面モック（p6〜8）の各要素を圧縮 */
  .screen .scbar{ padding:1.2mm 3mm; }
  .screen .crumb{ padding:1.4mm 3mm; }
  .screen .side, .screen .main2{ padding-top:2.2mm; padding-bottom:2.2mm; }
  .screen .side .sh{ margin:.5mm 0 .3mm; }
  .screen .tree li{ padding:.85mm 2mm; }
  .screen .ck{ margin:0; }
  .screen .cardsg{ gap:1.6mm; }
  .screen .rc{ padding:1.3mm; }
  .screen .rc .th{ height:3.5mm; margin-bottom:.9mm; }
  .screen .mega{ padding:1.8mm; margin-bottom:1.8mm; }
  .screen .relbox{ padding:1.7mm; margin-top:1.8mm; }
  .screen .reltile{ height:7mm; }
  /* p6 の「4つの入口」カード */
  .flow4{ gap:2.4mm; }
  .f4{ padding:1.8mm 2.6mm; }
  .f4 .n{ width:4.6mm; height:4.6mm; margin-bottom:1mm; }
  /* 画面スライド下部の価値ボックス */
  .screen ~ .vrow .vbox{ padding:3mm 5mm; }
  /* 巻末明細：ページ跨ぎで行を割らない */
  .estd-t tr{ break-inside:avoid; }
  /* 合計行を tbody 内で tfoot 同等に見せる（ページ跨ぎでの繰り返しを防ぐ） */
  .estd-t .sumrow td{ font-weight:800; color:var(--ink); border-top:2px solid var(--main-dd); background:var(--soft2); padding:2.4mm 3.6mm; }
  .estd-t .sumrow.tot td{ background:var(--main-dd); color:#fff; font-size:11.5pt; }
  /* p3（dense）：行数が多い表を実圧縮し、最下部の注記をフッター上に収める */
  .dense .lead{ margin-top:2.6mm; }
  .dense table.t th{ padding-top:1.3mm; padding-bottom:1.3mm; }
  .dense table.t td{ padding-top:1.0mm; padding-bottom:1.0mm; }
  .dense .note{ padding:2.6mm 5mm; line-height:1.5; }
  .dense .body{ margin-top:2.5mm; }
  /* p3：表と下の注記がくっつかないよう最小の余白を確保 */
  .dense table.t{ margin-bottom:4mm; }
  /* 画面スライド（scr）：先頭を少し上に詰めて画面＋価値ボックスをフッター上に収める */
  .scr .lead{ margin-top:2.6mm; }
  .scr .body{ margin-top:4mm; }
  /* p4〜6：画面イメージと下の価値ボックスの間に必ず余白を出す（auto任せにしない） */
  .scr .screen{ margin-bottom:6mm; }
  /* 巻末明細：分類は帯行（rowspan廃止で自然にページ送り） */
  .estd-t .catrow td{ background:var(--soft2); color:var(--main-dd); font-weight:800; font-size:9.6pt; padding:1.5mm 3.6mm; border-top:1.5px solid var(--main); }
  /* P.8（移行）：分担注記を足したぶん、下部2カラムの行間を詰めてフッターに収める */
  #mig ul.li li{ padding-top:.9mm; padding-bottom:.9mm; }
  #mig .col h4{ margin-bottom:2mm; }
  #mig .body{ margin-top:3mm; }
  #mig table.t th{ padding-top:1.3mm; padding-bottom:1.3mm; }
  #mig table.t td{ padding-top:1.1mm; padding-bottom:1.1mm; }
  #mig table.t tfoot td{ padding-top:1.6mm; padding-bottom:1.6mm; }
  #mig .note{ padding:2.4mm 5mm; line-height:1.45; }
  /* P.8（価値）：4枚のカードでインパクトを出す */
  .vcards{ display:grid; grid-template-columns:1fr 1fr; gap:6mm; flex:1; align-content:center; }
  .vcard{ background:var(--soft); border:1px solid var(--line); border-top:5px solid var(--main); border-radius:0 0 2.5mm 2.5mm; padding:7mm 7mm; display:flex; flex-direction:column; }
  .vcard .vch{ font-size:13.5pt; font-weight:800; color:var(--main-dd); margin-bottom:3mm; letter-spacing:.02em; }
  .vcard .vcb{ font-size:11.5pt; color:var(--ink); line-height:1.75; }
  .vcard .vcb b{ color:var(--main-dd); }
  /* P.9（進め方）：各フェーズの下にポイントを配置（タイムラインと同じ 1:2:1 で揃える） */
  .phpts{ display:flex; gap:2.5mm; margin-top:4mm; }
  .php{ flex-basis:0; min-width:0; background:var(--soft); border:1px solid var(--line); border-top:3px solid var(--main); border-radius:0 0 2mm 2mm; padding:3mm 3.6mm; }
  .php .phh{ font-size:10.5pt; font-weight:800; color:var(--main-dd); margin-bottom:1.6mm; }
  .php ul{ list-style:none; }
  .php li{ font-size:9.4pt; color:var(--ink); line-height:1.5; padding:.9mm 0 .9mm 4mm; position:relative; }
  .php li:before{ content:""; position:absolute; left:0; top:2.6mm; width:1.6mm; height:1.6mm; border-radius:50%; background:var(--main); }
  .php li b{ color:var(--main-dd); }
  /* P.10（お見積）：余白が大きいのでコンテンツを大きく */
  #estimate .est{ margin-top:6mm; }
  #estimate .price{ padding:13mm 11mm; }
  #estimate .price .cap{ font-size:11.5pt; }
  #estimate .price .big{ font-size:30pt; }
  #estimate .price .tax{ font-size:13pt; }
  #estimate .price .meta{ font-size:11.5pt; margin-top:10mm; line-height:2; }
  #estimate .incl h4{ font-size:14.5pt; margin-bottom:5mm; }
  #estimate ul.chk li{ font-size:12pt; padding:2.7mm 0 2.7mm 8mm; }
  #estimate .note{ font-size:11.5pt; }
  /* P.13（お願いすること）：項目を増やした分、表の行間を詰めてフッターに収める */
  #ask .lead{ margin-top:2.6mm; }
  #ask table.t th{ padding-top:1.8mm; padding-bottom:1.8mm; }
  #ask table.t td{ padding-top:1.7mm; padding-bottom:1.7mm; line-height:1.45; }
  #ask .note{ padding:2.6mm 5mm; }
  /* P.6（講座検索）：サイドバーの絞り込み項目が多く画面が高い → 画面内を実圧縮し値ボックスをフッター上に収める */
  #crs .body{ margin-top:3mm; }
  #crs .screen .side .sh{ margin:.2mm 0 .2mm; font-size:8pt; }
  #crs .screen .ck{ font-size:7.9pt; line-height:1.2; }
  #crs .screen .fw{ margin:.4mm 0 1.2mm; }
  #crs .screen .tagrow{ margin-top:.3mm; }
  #crs .screen .rc .th{ height:3mm; margin-bottom:.7mm; }
  #crs .screen .cardsg{ gap:1.3mm; }
  #crs .screen ~ .vrow .vbox{ padding:2.6mm 5mm; }
  /* ===== 画面イメージ注記の追加分を吸収＋フッター被り解消（全ページ） ===== */
  .imgnote{ margin-top:1.2mm; font-size:9.2pt; }
  .scr .screen{ margin-bottom:3.6mm; }
  .scr .body{ margin-top:2.6mm; }
  /* p6 講座（最もタイト） */
  #crs .imgnote{ margin-top:.8mm; font-size:8.8pt; }
  #crs .screen{ margin-bottom:2.6mm; }
  #crs .body{ margin-top:2mm; }
  #crs .screen ~ .vrow .vbox{ padding:2.2mm 5mm; }
  /* p7 移行：詰まりすぎと被りの中間（1ページに収まる範囲で余白を出す） */
  #mig .ttl{ margin-top:3mm; }
  #mig .lead{ margin-top:2.6mm; }
  #mig .body{ margin-top:3.2mm; }
  #mig table.t{ margin-top:1.2mm; }
  #mig table.t th{ padding-top:1.4mm; padding-bottom:1.4mm; }
  #mig table.t td{ padding-top:1.2mm; padding-bottom:1.2mm; }
  #mig .note{ margin-top:2.4mm!important; padding:2.4mm 5mm!important; line-height:1.48; }
  #mig .cols{ margin-top:2.4mm!important; }
  #mig ul.li li{ padding-top:.9mm!important; padding-bottom:.9mm!important; }
</style>
</head>
