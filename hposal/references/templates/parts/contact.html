     会社名・担当・連絡先は人間が埋める未確定値が多い→ {{ }} でなく（…）で残してよい（#15）。 -->
<section class="slide">
  <div class="brandbar"></div>
  <div class="eyebrow">Contact</div>
  <div class="ttl">お問い合わせ</div>
  <div class="lead">本ご提案について、ご不明な点・ご相談は下記までお気軽にお寄せください。</div>
  <div class="body">
    <div class="note" style="margin-top:0;line-height:1.8">
      <b class="ink" style="font-size:12pt">（提案者 会社名）</b><br>
      ご担当：（担当者名）<br>
      メール：（メールアドレス）<br>
      電話：（電話番号）<br>
      （住所・その他）
    </div>
  </div>
  <div class="footmark">{{宛先}} / （提案者）</div>
  <div class="pg">{{頁}} / {{総ページ数}}</div>
</section>
