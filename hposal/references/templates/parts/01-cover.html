<!-- ╔═ PART: 01-cover ═╗ 第1層・要件｜表紙：このご提案を一言で。1パーツ＝1スライド。
     表紙コピー＝最重視テーマを一言で。表紙・現状・目指す姿に同じ軸を通す。表紙に .pg/.footmark は置かない。 -->
<section class="slide cover">
  <div style="position:absolute;top:14mm;right:20mm;text-align:right;font-size:10.5pt;color:#cfe7f6;line-height:1.9">
    発行日：{{発行日}}<br>
    見積有効期限：{{有効期限}}
  </div>
  <div class="eyebrow">{{英語ラベル 例: Website Renewal Proposal}}</div>
  <h1>{{表紙コピー 例: ○○を、<br>ひとつに。}}</h1>
  <div class="sub">{{提案サブタイトル 例: ○○サイト構築のご提案}}</div>
  <div class="desc">
    {{背景の一文：いま何が起きていて、なぜ今変えるか}}<br>
    <b>{{引き継ぐ資産・前提}}</b>を活かしながら、{{目指す状態}}へ。<br>
    ねらいは、<b>{{価値① 例: 探している人が迷わず見つけられること}}</b>。そして<b>{{価値②}}</b>。
  </div>
  <div class="who">提案：<b>（提案者）</b>　／　宛先：<b>{{宛先}} 御中</b></div>
</section>
